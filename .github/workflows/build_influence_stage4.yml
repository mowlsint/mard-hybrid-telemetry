name: Build Influence Social Stage 4

on:
  workflow_dispatch:
    inputs:
      max_stage2_endpoints:
        description: "Maximum website and Telegram endpoints"
        required: false
        default: "300"
      max_social_endpoints:
        description: "Maximum Bluesky and YouTube endpoints"
        required: false
        default: "180"
      concurrency:
        description: "Parallel Stage 2 requests"
        required: false
        default: "8"
      social_concurrency:
        description: "Parallel Bluesky and YouTube requests"
        required: false
        default: "6"

permissions:
  contents: write

concurrency:
  group: mard-influence-repo-writer
  cancel-in-progress: false

jobs:
  build-social-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      MARD_INFLUENCE_MAX_ENDPOINTS: ${{ inputs.max_stage2_endpoints || '300' }}
      MARD_INFLUENCE_CONCURRENCY: ${{ inputs.concurrency || '8' }}
      MARD_INFLUENCE_MAX_SOCIAL_ENDPOINTS: ${{ inputs.max_social_endpoints || '180' }}
      MARD_INFLUENCE_SOCIAL_CONCURRENCY: ${{ inputs.social_concurrency || '6' }}
      MARD_INFLUENCE_REQUEST_TIMEOUT_MS: "15000"
      MARD_INFLUENCE_MAX_ITEMS_PER_SOURCE: "12"
      MARD_INFLUENCE_MAX_ITEMS_PER_SOCIAL_SOURCE: "30"
      MARD_INFLUENCE_MAX_BODY_BYTES: "3000000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".node-version"
          package-manager-cache: false

      - name: Show runtime
        run: node --version

      - name: Validate influence registry
        run: node scripts/influence/validate_influence_registry.mjs

      - name: Fetch website, RSS and Telegram metadata
        run: node scripts/influence/fetch_influence_stage2.mjs

      - name: Check Stage 2 outputs
        run: node scripts/influence/check_influence_stage2.mjs

      - name: Fetch Bluesky and YouTube metadata
        run: node scripts/influence/fetch_influence_stage4_social.mjs

      - name: Check Stage 4 outputs
        run: node scripts/influence/check_influence_stage4_social.mjs

      - name: Show public social status
        run: |
          cat public/influence_social_ingest_status.json
          cat public/influence_social_source_health.json

      - name: Commit Stage 2 and Stage 4 outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/influence/ingest/items_latest.json \
            data/influence/ingest/source_health_latest.json \
            data/influence/ingest/social_source_health_latest.json \
            public/influence_ingest_status.json \
            public/influence_source_health.json \
            public/influence_social_ingest_status.json \
            public/influence_social_source_health.json

          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi

          git commit -m "Update Influence Social Stage 4 outputs"
          git push
