name: Build Influence Ingest Stage 2

on:
  workflow_dispatch:
    inputs:
      max_endpoints:
        description: "Maximum website and Telegram endpoints for this test run"
        required: false
        default: "180"
      concurrency:
        description: "Parallel requests (recommended 3-5)"
        required: false
        default: "5"

permissions:
  contents: write

concurrency:
  group: build-influence-stage2
  cancel-in-progress: false

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      MARD_INFLUENCE_MAX_ENDPOINTS: ${{ inputs.max_endpoints || '180' }}
      MARD_INFLUENCE_CONCURRENCY: ${{ inputs.concurrency || '5' }}
      MARD_INFLUENCE_REQUEST_TIMEOUT_MS: "12000"
      MARD_INFLUENCE_MAX_ITEMS_PER_SOURCE: "10"
      MARD_INFLUENCE_MAX_BODY_BYTES: "2000000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate influence registry
        run: node scripts/influence/validate_influence_registry.mjs

      - name: Fetch website, RSS and Telegram metadata
        run: node scripts/influence/fetch_influence_stage2.mjs

      - name: Check Stage 2 outputs
        run: node scripts/influence/check_influence_stage2.mjs

      - name: Show public ingest status
        run: |
          cat public/influence_ingest_status.json
          cat public/influence_source_health.json

      - name: Commit Stage 2 outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/influence/ingest/items_latest.json \
            data/influence/ingest/source_health_latest.json \
            public/influence_ingest_status.json \
            public/influence_source_health.json

          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi

          git commit -m "Update influence Stage 2 ingest outputs"
          git push
